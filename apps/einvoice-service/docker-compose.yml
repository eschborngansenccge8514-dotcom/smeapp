version: '3.9'

services:

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:     sandbox
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      einvoice
      DB_USER:      postgres
      DB_PASSWORD:  postgres
      REDIS_HOST:   redis
      REDIS_PORT:   6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./certs:/app/certs:ro   # mount cert directory read-only

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       einvoice
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10
    command: redis-server --appendonly yes   # persist queue to disk

volumes:
  postgres_data:
  redis_data:
